schema: v1

# --- TOOLS GLOBALS ---

#experimental:
#  useSystemMessageTools: true

# Add this at the root level (same indentation level as 'models:')
tools:
  - name: read_currently_open_file
    policy: allow
  - name: read_file
    policy: allow
  - name: edit_existing_file
    policy: ask
  - name: create_new_file
    policy: allow
  - name: run_terminal_command
    policy: ask
  - name: view_directory_tree
