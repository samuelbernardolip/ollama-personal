prompts:
  - name: commit
    description: "Generate a GitLab MR-friendly commit message"
    prompt: |
      You are an expert developer creating a git commit message optimized for a GitLab Merge Request description.
      
      Review the staged code changes provided below:
      {{{ input }}}

      Generate a commit message matching these strict GitLab MR rules:
      1. Write a short, imperative summary line (max 50 chars). 
      2. Leave a blank line after the summary line.
      3. Provide a detailed bulleted list explaining *what* changed and *why* (not just how).
      4. Reference related issues/tickets at the bottom if implied (e.g., "Closes #123" or "Chore:").
      5. Output ONLY the raw commit message text. No markdown blocks, no 'Here is your message:', and no formatting backticks.

